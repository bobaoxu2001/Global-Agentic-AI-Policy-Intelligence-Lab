name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (ADRS formula — SPEC §13, ENG §12.1)
        run: npm test
      - name: Integration tests (pipeline + integrity — ENG §12.2)
        run: npm run test:integration
      - name: Validate (fixtures profile)
        run: npm run validate
        env:
          BUILD_PROFILE: fixtures
      - name: Production fixture-rejection gate (MUST fail while fixture corpus present — CB-4)
        run: |
          if BUILD_PROFILE=production npm run validate; then
            echo "ERROR: production validation accepted fixture content — CB-4 gate broken"
            exit 1
          else
            echo "OK: production profile correctly rejected fixture content"
          fi
      - name: Fixture-deploy guard (BUILD_PROFILE=fixtures + DEPLOY_ENV=production MUST abort)
        run: |
          if BUILD_PROFILE=fixtures DEPLOY_ENV=production npm run validate; then
            echo "ERROR: fixtures profile was allowed in a production deploy environment"
            exit 1
          else
            echo "OK: fixture-deploy guard held"
          fi
      - name: JSON Schema artifacts up to date (Zod is normative — MN-15)
        run: |
          npm run schemas:json
          git diff --exit-code schemas/
      - name: Build (fixtures profile)
        run: npm run build:fixtures

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: E2E (fixtures profile — banner, shells, calculator wiring)
        run: npm run test:e2e

  # Deployment is intentionally absent in Phase 0. When added, it MUST:
  #   1. build with BUILD_PROFILE=production only,
  #   2. run after the fixture-rejection gate above,
  #   3. set DEPLOY_ENV=production so the fixture-deploy guard can hold (CB-4 rule 10).
