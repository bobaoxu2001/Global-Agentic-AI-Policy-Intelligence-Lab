name: CI

on:
  push:
  pull_request:

jobs:
  preview-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:integration
      - run: npm run validate:preview
      - run: npm run build:preview
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:preview
      - run: npm run generate:preview-exports
      - name: Generated preview exports are committed
        run: git diff --exit-code -- public/downloads/

  fixture-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:integration
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run test:e2e:production
      - name: Fixture-deploy guard
        run: |
          if BUILD_PROFILE=fixtures DEPLOY_ENV=production npm run validate; then
            echo "Fixture profile was allowed in a production deployment environment"
            exit 1
          fi
      - name: JSON Schema artifacts are current
        run: |
          npm run schemas:json
          git diff --exit-code schemas/
      - run: npm run build:fixtures

  publication-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check the production publication gate
        id: gate
        run: |
          if npm run validate:production; then
            echo "publication_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "publication_ready=false" >> "$GITHUB_OUTPUT"
            echo "Production corpus is not ready for publication; this is reported, not treated as CI failure."
          fi
      - name: Build production only after the publication gate passes
        if: steps.gate.outputs.publication_ready == 'true'
        run: npm run build:production
